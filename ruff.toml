target-version = "py311"
line-length = 100
extend-exclude = [".venv", "dist", "build"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = []

[lint.per-file-ignores]
"tests/**/*.py" = ["B018"]

[format]
quote-style = "double"
indent-style = "space"
